name: Release macOS DMG

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (e.g. v0.2.0). Leave empty to build only without creating a release.'
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages (Go + web + api + Electron)
        run: pnpm dist

      - name: List produced DMG
        run: ls -lh apps/desktop/release/

      - name: Upload DMG as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: locagens-macos-dmg
          path: apps/desktop/release/*.dmg
          if-no-files-found: error
          retention-days: 14

      - name: Create GitHub Release with DMG
        if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) || (github.event_name == 'workflow_dispatch' && inputs.tag_name != '')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          files: apps/desktop/release/*.dmg
          generate_release_notes: true
          fail_on_unmatched_files: false
